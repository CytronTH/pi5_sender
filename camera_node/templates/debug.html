<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ display_name }} Debug Logs - {{ hostname }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #22c55e;
            --warning-color: #eab308;
            --danger-color: #ef4444;
            --accent-color: #6366f1;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--surface-color);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .badge {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(99, 102, 241, 0.5);
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        /* Toggle switch styling */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .3s;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: #94a3b8;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        input:checked + .slider:before {
            transform: translateX(16px);
            background-color: white;
        }

        #logContainer {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            background-color: #000;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #d1d5db;
        }

        .log-line {
            word-wrap: break-word;
            padding-left: 1rem;
            text-indent: -1rem;
            margin-bottom: 0.2rem;
        }
        
        .log-time {
            color: #6ee7b7;
            margin-right: 0.5rem;
        }
        
        .log-level-error { color: #fca5a5; }
        .log-level-warn { color: #fde047; }
        .log-level-info { color: #93c5fd; }
        
        /* Custom scrollbar for log container */
        #logContainer::-webkit-scrollbar {
            width: 10px;
        }
        #logContainer::-webkit-scrollbar-track {
            background: #0f172a;
        }
        #logContainer::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 5px;
        }
        #logContainer::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            gap: 10px;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>{{ display_name }} Logs</h1>
            <span class="badge" id="serviceBadge">Loading...</span>
        </div>
        <div class="controls">
            <label>
                Auto-scroll
                <label class="toggle-switch">
                    <input type="checkbox" id="autoScrollToggle" checked>
                    <span class="slider"></span>
                </label>
            </label>
            <span id="statusIndicator" style="color: var(--text-muted); font-size: 0.8rem;">●</span>
        </div>
    </header>

    <div id="logContainer">
        <div class="loading"><div class="spinner"></div> Connecting to log stream...</div>
    </div>

    <script>
        const camId = "{{ cam_id }}";
        const serverStartTime = "{{ start_time }}";
        const logContainer = document.getElementById('logContainer');
        const autoScrollToggle = document.getElementById('autoScrollToggle');
        const serviceBadge = document.getElementById('serviceBadge');
        const statusIndicator = document.getElementById('statusIndicator');
        
        let fetchInterval;
        let isFetching = false;
        let lastLogContent = "";

        function formatLogLine(line) {
            if (!line.trim()) return '';
            
            // Basic parsing of journalctl output
            // Example: 2023-11-20T10:30:15+00:00 hostname process[PID]: Message
            
            const match = line.match(/^([0-9T:+-]+)\s+(\S+)\s+(.+?):\s+(.*)$/);
            
            if (match) {
                const [_, time, host, process, message] = match;
                
                let msgClass = "";
                let lowerMsg = message.toLowerCase();
                
                if (lowerMsg.includes("error") || lowerMsg.includes("fail") || lowerMsg.includes("critical")) {
                    msgClass = "log-level-error";
                } else if (lowerMsg.includes("warn")) {
                    msgClass = "log-level-warn";
                } else if (lowerMsg.includes("info")) {
                    msgClass = "log-level-info";
                }
                
                return `<div class="log-line"><span class="log-time">[${time.split('T')[1].split('+')[0]}]</span> <span class="${msgClass}">${message}</span></div>`;
            }
            
            // Fallback for lines that don't match the regex pattern
            let msgClass = "";
            let lowerLine = line.toLowerCase();
            if (lowerLine.includes("error") || lowerLine.includes("fail") || lowerLine.includes("traceback")) {
                msgClass = "log-level-error";
            }
            return `<div class="log-line ${msgClass}">${line.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>`;
        }

        async function fetchLogs() {
            if (isFetching) return;
            isFetching = true;
            statusIndicator.style.color = "var(--success-color)";
            
            try {
                const response = await fetch(`/api/logs/${camId}?since=${encodeURIComponent(serverStartTime)}`);
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.status === "success" && data.logs !== lastLogContent) {
                        lastLogContent = data.logs;
                        
                        // Update badge info
                        serviceBadge.textContent = `${data.mode.toUpperCase()}: ${data.service}`;
                        
                        // Process and display logs
                        const lines = data.logs.split('\n');
                        let html = '';
                        
                        if (lines.length <= 1 && !lines[0]) {
                            html = '<div class="loading">No recent logs available for this service.</div>';
                        } else {
                            for (const line of lines) {
                                html += formatLogLine(line);
                            }
                        }
                        
                        // Preserve scroll position if auto-scroll is off
                        const previousScrollTop = logContainer.scrollTop;
                        
                        logContainer.innerHTML = html;
                        
                        // Auto-scroll logic
                        if (autoScrollToggle.checked) {
                            logContainer.scrollTop = logContainer.scrollHeight;
                        } else {
                            logContainer.scrollTop = previousScrollTop;
                        }
                    }
                } else {
                    console.error("Failed to fetch logs", response.status);
                    statusIndicator.style.color = "var(--warning-color)";
                }
            } catch (err) {
                console.error("Error fetching logs:", err);
                statusIndicator.style.color = "var(--danger-color)";
            } finally {
                isFetching = false;
                setTimeout(() => {
                    statusIndicator.style.color = "var(--text-muted)";
                }, 500);
            }
        }

        // Setup auto-scroll toggle behavior
        logContainer.addEventListener('scroll', () => {
            // Only tracking if the user manually scrolled up
            // Check if user is near bottom
            const isNearBottom = logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < 50;
            if (!isNearBottom && autoScrollToggle.checked) {
                // User scrolled up, don't automatically turn off but let them know it won't force scroll
                // Actually, let's turn off auto-scroll if they scroll up manually
               autoScrollToggle.checked = false;
            } else if (isNearBottom && !autoScrollToggle.checked) {
                autoScrollToggle.checked = true;
            }
        });

        autoScrollToggle.addEventListener('change', () => {
             if (autoScrollToggle.checked) {
                 logContainer.scrollTop = logContainer.scrollHeight;
             }
        });

        // Initialize fetching
        fetchLogs();
        fetchInterval = setInterval(fetchLogs, 2000);
        
        // Handle window unload
        window.addEventListener('beforeunload', () => {
            clearInterval(fetchInterval);
        });
    </script>
</body>
</html>
