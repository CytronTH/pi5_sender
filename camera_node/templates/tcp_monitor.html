<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 TCP Output Monitor - {{ cam_id.upper() }}</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --danger-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-stale {
            background: rgba(234, 179, 8, 0.2);
            color: #facc15;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .grid-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            align-items: flex-start;
        }

        .image-card {
            position: relative;
            background: #000;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .image-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .image-card img {
            display: block;
            max-width: 100%;
            max-height: calc(100vh - 200px);
            object-fit: contain;
        }

        .image-label {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 Live Monitor <span style="color: var(--text-color);">| {{ cam_id.upper() }}</span></h1>
        <div class="header-controls">
            <div id="statusBadge" class="status-badge">⏳ Connecting...</div>
            <div style="color: var(--text-muted); font-size: 0.85rem;" id="timestampBadge">Waiting for frame</div>
        </div>
    </div>

    <div class="grid-container">
        <div id="emptyState" class="empty-state">
            <div class="icon">📡</div>
            <h3 style="margin:0 0 0.5rem 0;">Waiting for TCP Stream</h3>
            <p style="margin:0;">Trigger a capture via MQTT to see the processed images here.</p>
        </div>
        <div id="monitorGrid" class="grid">
            <!-- Images will be injected here -->
        </div>
    </div>

    <script>
        const camId = "{{ cam_id }}";
        const grid = document.getElementById('monitorGrid');
        const emptyState = document.getElementById('emptyState');
        const statusBadge = document.getElementById('statusBadge');
        const timestampBadge = document.getElementById('timestampBadge');
        
        let lastTimestamp = 0;

        function updateStatus(status) {
            statusBadge.className = 'status-badge';
            if (status === 'success') {
                statusBadge.classList.add('status-active');
                statusBadge.innerText = '🟢 Stream Active';
            } else if (status === 'stale') {
                statusBadge.classList.add('status-stale');
                statusBadge.innerText = '⏸️ Stream Idle';
            } else {
                statusBadge.innerText = '⏳ Waiting...';
            }
        }

        async function pollData() {
            try {
                const res = await fetch(`/api/tcp_monitor/${camId}`);
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                
                if (data.status === 'success' || data.status === 'stale') {
                    updateStatus(data.status);
                    
                    if (data.data.timestamp > lastTimestamp) {
                        lastTimestamp = data.data.timestamp;
                        emptyState.style.display = 'none';
                        grid.innerHTML = '';
                        
                        // Update time badge
                        const date = new Date(lastTimestamp * 1000);
                        timestampBadge.innerText = "Last frame: " + date.toLocaleTimeString();
                        
                        if (data.data.images && data.data.images.length > 0) {
                            data.data.images.forEach(img => {
                                const card = document.createElement('div');
                                card.className = 'image-card';
                                
                                const imgEl = document.createElement('img');
                                imgEl.src = 'data:image/jpeg;base64,' + img.data;
                                
                                const label = document.createElement('div');
                                label.className = 'image-label';
                                label.innerText = `[${img.id}]`;
                                
                                card.appendChild(imgEl);
                                card.appendChild(label);
                                grid.appendChild(card);
                            });
                        }
                    }
                } else if (data.status === 'waiting') {
                    updateStatus('waiting');
                }
            } catch (err) {
                console.error("Polling error:", err);
                statusBadge.className = 'status-badge';
                statusBadge.style.color = 'var(--danger-color)';
                statusBadge.innerText = '❌ Connection Error';
            }
        }

        // Poll every 500ms
        setInterval(pollData, 500);
        pollData(); // Initial poll
    </script>
</body>
</html>
